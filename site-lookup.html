<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --border: #1e2530;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #e8edf2;
    --muted: #5a6472;
    --success: #00e5a0;
    --warning: #ffd166;
    --card-bg: #13171d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 12px;
  }

  .header-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .search-box {
    width: 100%;
    max-width: 480px;
    position: relative;
    margin-bottom: 20px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    padding: 14px 14px 14px 42px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  input::placeholder {
    text-transform: none;
    color: var(--muted);
    letter-spacing: 0;
    font-size: 13px;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.08);
  }

  .clear-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    display: none;
    line-height: 1;
    padding: 4px;
  }

  .clear-btn.visible { display: block; }

  .result-area {
    width: 100%;
    max-width: 480px;
  }

  .result-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 3px 0 0 3px;
  }

  .site-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .company-badge {
    display: inline-block;
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.2);
    color: var(--accent);
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 10px;
  }

  .location {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .category-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .category-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .cat-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 4px;
  }

  .cat-Aplus { background: rgba(0, 229, 160, 0.15); color: var(--success); border: 1px solid rgba(0, 229, 160, 0.3); }
  .cat-A     { background: rgba(0, 212, 255, 0.12); color: var(--accent); border: 1px solid rgba(0, 212, 255, 0.25); }
  .cat-B     { background: rgba(255, 209, 102, 0.12); color: var(--warning); border: 1px solid rgba(255, 209, 102, 0.25); }
  .cat-C     { background: rgba(255, 107, 53, 0.12); color: var(--accent2); border: 1px solid rgba(255, 107, 53, 0.25); }

  .no-result {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
  }

  .no-result .big { font-size: 32px; margin-bottom: 8px; }
  .no-result p { font-size: 13px; font-family: 'IBM Plex Mono', monospace; }

  .hint {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 10px;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
  }

  .stat-lbl {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  .map-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .map-link:hover { opacity: 1; }

  .result-count {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 10px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">

  <h1>Site <span>Lookup</span></h1>
  <div class="subtitle">72 sites · USAM / CANA</div>
</div>

  </div>
  <div class="divider"></div>
  <div class="stat">

  <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>

const input = document.getElementById('searchInput');
const resultArea = document.getElementById('resultArea');
const clearBtn = document.getElementById('clearBtn');

function catClass(cat) {
  return 'cat-' + cat.replace('+', 'plus');
}

function mapsUrl(location) {
  return 'https://maps.google.com/?q=' + encodeURIComponent(location);
}

function renderCards(results, query) {
  if (!query) {
    resultArea.innerHTML = '<div class="hint">Enter a site code like USAM-794 or search by company/location</div>';
    return;
  }
  if (results.length === 0) {
    resultArea.innerHTML = `<div class="no-result"><div class="big">🔎</div><p>No site found for "${query}"</p></div>`;
    return;
  }
  let html = `<div class="result-count">${results.length} result${results.length > 1 ? 's' : ''}</div>`;
  results.forEach(s => {
    html += `
    <div class="result-card">
      <div class="site-id">${s.id}</div>
      <div class="company-badge">${s.company}</div>
      <div class="location">📍 ${s.location}</div>
      <div class="category-row">
        <span class="category-label">CAT</span>
        <span class="cat-badge ${catClass(s.cat)}">${s.cat}</span>
      </div>
      <a class="map-link" href="${mapsUrl(s.location)}" target="_blank">↗ Open in Maps</a>
    </div>`;
  });
  resultArea.innerHTML = html;
}

function search() {
  const q = input.value.trim().toUpperCase();
  clearBtn.classList.toggle('visible', input.value.length > 0);
  if (!q) { renderCards([], ''); return; }
  const results = sites.filter(s =>
    s.id.toUpperCase().includes(q) ||
    s.company.toUpperCase().includes(q) ||
    s.location.toUpperCase().includes(q)
  );
  renderCards(results, q);
}

function clearSearch() {
  input.value = '';
  clearBtn.classList.remove('visible');
  renderCards([], '');
  input.focus();
}

input.addEventListener('input', search);
input.focus();
</script>

</html>
