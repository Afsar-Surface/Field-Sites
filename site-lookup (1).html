<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Site Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --border: #1e2530;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #e8edf2;
    --muted: #5a6472;
    --success: #00e5a0;
    --warning: #ffd166;
    --card-bg: #13171d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 14px 40px;
  }
  .header { text-align: center; margin-bottom: 18px; padding-top: 10px; }
  .header-tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }

  .stats-bar { display: flex; justify-content: center; gap: 18px; margin-bottom: 16px; }
  .stat { text-align: center; }
  .stat-num { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; color: var(--accent); }
  .stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .divider { width: 1px; background: var(--border); align-self: stretch; }

  .filters { width: 100%; max-width: 480px; display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    padding: 7px 10px; outline: none; flex: 1; min-width: 100px;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  .search-box { width: 100%; max-width: 480px; position: relative; margin-bottom: 12px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
  input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 14px; padding: 13px 36px 13px 42px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.5px; text-transform: uppercase;
  }
  input::placeholder { text-transform: none; color: var(--muted); letter-spacing: 0; font-size: 12px; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.08); }
  .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; display: none; padding: 4px; }
  .clear-btn.visible { display: block; }

  .result-area { width: 100%; max-width: 480px; }

  .result-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 8px; position: relative; overflow: hidden;
    animation: slideIn 0.15s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
  .result-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 3px 0 0 3px; }
  .result-card.premium::before { background: var(--success); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
  .site-id { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: 1px; }
  .premium-tag { font-family: 'IBM Plex Mono', monospace; font-size: 9px; background: rgba(0,229,160,0.15); color: var(--success); border: 1px solid rgba(0,229,160,0.3); padding: 2px 7px; border-radius: 4px; letter-spacing: 1px; }

  .badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .badge { display: inline-block; font-size: 9px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 4px; }
  .badge-sector { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); color: var(--accent); }
  .badge-type { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--muted); }

  .location { font-size: 12px; color: var(--text); line-height: 1.5; margin-bottom: 8px; }
  .card-bottom { display: flex; align-items: center; justify-content: space-between; }
  .category-row { display: flex; align-items: center; gap: 6px; }
  .category-label { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

  .cat-badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 4px; }
  .cat-Aplus { background: rgba(0,229,160,0.15); color: var(--success); border: 1px solid rgba(0,229,160,0.3); }
  .cat-A     { background: rgba(0,212,255,0.12); color: var(--accent); border: 1px solid rgba(0,212,255,0.25); }
  .cat-B     { background: rgba(255,209,102,0.12); color: var(--warning); border: 1px solid rgba(255,209,102,0.25); }
  .cat-C     { background: rgba(255,107,53,0.12); color: var(--accent2); border: 1px solid rgba(255,107,53,0.25); }
  .cat-D     { background: rgba(150,150,150,0.1); color: var(--muted); border: 1px solid rgba(150,150,150,0.2); }

  .map-link { font-size: 11px; color: var(--accent); text-decoration: none; font-family: 'IBM Plex Mono', monospace; opacity: 0.7; transition: opacity 0.2s; white-space: nowrap; }
  .map-link:hover { opacity: 1; }

  .no-result { text-align: center; padding: 30px 16px; color: var(--muted); }
  .no-result .big { font-size: 30px; margin-bottom: 8px; }
  .no-result p { font-size: 12px; font-family: 'IBM Plex Mono', monospace; }

  .hint { text-align: center; color: var(--muted); font-size: 11px; font-family: 'IBM Plex Mono', monospace; padding: 12px 0; }
  .result-count { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 8px; text-align: center; }
  .more-hint { text-align: center; font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 8px; }
</style>
</head>

const input = document.getElementById('searchInput');
const resultArea = document.getElementById('resultArea');
const clearBtn = document.getElementById('clearBtn');
const sectorFilter = document.getElementById('sectorFilter');
const catFilter = document.getElementById('catFilter');
const premiumFilter = document.getElementById('premiumFilter');

function catClass(cat) {
  if (cat === 'A+') return 'cat-Aplus';
  if (cat === 'A') return 'cat-A';
  if (cat === 'B') return 'cat-B';
  if (cat === 'C') return 'cat-C';
  return 'cat-D';
}

function mapsUrl(loc) {
  return 'https://maps.google.com/?q=' + encodeURIComponent(loc);
}

function renderCards(results, query) {
  const hasFilter = sectorFilter.value || catFilter.value || premiumFilter.value;
  if (!query && !hasFilter) {
    resultArea.innerHTML = '<div class="hint">Search by site code (e.g. USAM-679), city, or location type</div>';
    return;
  }
  if (results.length === 0) {
    resultArea.innerHTML = '<div class="no-result"><div class="big">🔎</div><p>No sites found</p></div>';
    return;
  }
  const show = results.slice(0, 50);
  let html = '<div class="result-count">' + results.length + ' result' + (results.length !== 1 ? 's' : '') + (results.length > 50 ? ' (showing 50)' : '') + '</div>';
  show.forEach(s => {
    const isPremium = s.premium === 'Yes';
    html += `
    <div class="result-card ${isPremium ? 'premium' : ''}">
      <div class="card-top">
        <div class="site-id">${s.id}</div>
        ${isPremium ? '<span class="premium-tag">PREMIUM</span>' : ''}
      </div>
      <div class="badges">
        ${s.sector ? `<span class="badge badge-sector">${s.sector}</span>` : ''}
        ${s.type ? `<span class="badge badge-type">${s.type}</span>` : ''}
      </div>
      <div class="location">📍 ${s.location}</div>
      <div class="card-bottom">
        <div class="category-row">
          <span class="category-label">CAT</span>
          <span class="cat-badge ${catClass(s.cat)}">${s.cat}</span>
        </div>
        ${s.location ? `<a class="map-link" href="${mapsUrl(s.location)}" target="_blank">↗ Maps</a>` : ''}
      </div>
    </div>`;
  });
  if (results.length > 50) {
    html += '<div class="more-hint">Refine your search to see more results</div>';
  }
  resultArea.innerHTML = html;
}

function search() {
  const q = input.value.trim().toUpperCase();
  const sector = sectorFilter.value;
  const cat = catFilter.value;
  const premium = premiumFilter.value;
  clearBtn.classList.toggle('visible', input.value.length > 0);

  const hasFilter = sector || cat || premium;
  if (!q && !hasFilter) { renderCards([], ''); return; }

  const results = sites.filter(s => {
    const matchQ = !q || s.id.toUpperCase().includes(q) || s.location.toUpperCase().includes(q) || s.type.toUpperCase().includes(q) || s.sector.toUpperCase().includes(q);
    const matchSector = !sector || s.sector === sector;
    const matchCat = !cat || s.cat === cat;
    const matchPremium = !premium || s.premium === premium;
    return matchQ && matchSector && matchCat && matchPremium;
  });
  renderCards(results, q);
}

function clearSearch() {
  input.value = '';
  clearBtn.classList.remove('visible');
  sectorFilter.value = '';
  catFilter.value = '';
  premiumFilter.value = '';
  renderCards([], '');
  input.focus();
}

input.addEventListener('input', search);
input.focus();
</script>
